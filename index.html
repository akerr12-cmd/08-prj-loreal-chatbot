<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Assistant</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
   <div class="beauty-tech-bg">
  <div class="floating-shapes"></div>

  <div class="page-wrapper">

    <!-- Header -->
    <header class="site-header">
      <h1 class="site-title">L’Oréal Beauty Advisor</h1>
      <p class="site-subtitle">Your personalized AI-powered routine builder</p>
    </header>

    <!-- Split Canvas Layout -->
    <main class="split-layout">

      <!-- Left Hero Panel -->
      <section class="hero-panel">
        <h2 class="hero-headline">Discover Your Perfect Routine</h2>
        <p class="hero-text">
          Powered by L’Oréal’s beauty science and intelligent product matching.
        </p>
      </section>

      <!-- Right Chat Panel -->
      <section class="chatbox glass-panel">
        <div id="chatWindow" class="chat-window"></div>

        <form id="chatForm" class="chat-form">
          <input
            id="userInput"
            name="userInput"
            type="text"
            placeholder="Ask me about products or routines…"
            autocomplete="off"
            required
          />
          <button type="submit" id="sendBtn">
            <span class="material-icons">send</span>
          </button>
        </form>
      </section>

    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <p>&copy; 2025 L’Oréal. All rights reserved.</p>
      <nav>
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Use</a>
        <a href="#">Contact</a>
      </nav>
    </footer>

  </div>
</div>


    <!-- secrets.js can be removed when using Cloudflare Workers for API requests -->
    <script src="secrets.js"></script>
    <script src="script.js"></script>
  </body>
</html>
